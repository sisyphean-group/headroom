name = "speech"
description = "VoIP-focused: fast envelopes, controlled dynamic range."

[agc]
enabled = true
target_lufs = -16.0
attack_ms = 600.0
release_ms = 200.0
silence_threshold_lufs = -65.0
max_boost_db = 20.0
max_cut_db = 6.0

[compressor]
enabled = true
detector = "peak"
threshold_db = -22.0
ratio = 3.0
knee_db = 4.0
attack_ms = 3.0
release_ms = 50.0
makeup_db = "auto"

[limiter]
ceiling_dbtp = -0.3
lookahead_ms = 2.0
release_ms = 50.0
hold_ms = 3.0
oversample = 4
link = "stereo"

# moderate psr cap: control plosives without losing diction
[limiter.soft]
max_psr_db = 10.0
static_ceiling_dbtp = -8.0
attack_ms = 2.0
release_ms = 100.0

[meters]
publish_hz = 20.0

# mark common voip apps explicitly
[[rules]]
match = { process_binary = ["Discord", "discord", "element-desktop", "Slack", "zoom", "WEBRTC VoiceEngine"] }
route = "processed"

[default_route]
route = "processed"
