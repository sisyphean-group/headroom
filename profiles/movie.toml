name = "movie"
description = "Wide-dynamic-range film: lifts quiet dialogue, keeps action punchy but bounded."

# slow agc toward film reference; asymmetric — boost dialogue more than cut action
[agc]
enabled = true
target_lufs = -20.0
attack_ms = 2500.0
release_ms = 1000.0
silence_threshold_lufs = -70.0
max_boost_db = 12.0
max_cut_db = 8.0

# soft-knee rms: lifts dialogue floor, leveling not crushing
[compressor]
enabled = true
detector = "rms"
threshold_db = -28.0
ratio = 2.0
knee_db = 8.0
attack_ms = 15.0
release_ms = 250.0
makeup_db = "auto"
rms_window_ms = 50.0

[limiter]
ceiling_dbtp = -1.0
lookahead_ms = 3.0
release_ms = 120.0
hold_ms = 5.0
oversample = 4
link = "stereo"

# generous psr cap: explosions punch through, just bounded
[limiter.soft]
max_psr_db = 18.0
static_ceiling_dbtp = -6.0
attack_ms = 8.0
release_ms = 250.0

[meters]
publish_hz = 20.0

# video players + browser video processed here (default/night bypass them). daws bypass
[[rules]]
match = { process_binary = ["ardour", "reaper", "qpwgraph", "carla", "bitwig-studio"] }
route = "bypass"

[[rules]]
match = { process_binary = ["mpv", "vlc", "firefox", "chromium", "google-chrome"] }
route = "processed"

[[rules]]
match = { media_role = ["Movie", "Video"] }
route = "processed"

[default_route]
route = "processed"
