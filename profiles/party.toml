name = "party"
description = "Loud room playback (the anti-night): maximum perceived loudness, dynamics sacrificed."

# push everything to a hot room-filling target; symmetric limits
[agc]
enabled = true
target_lufs = -12.0
attack_ms = 1500.0
release_ms = 600.0
silence_threshold_lufs = -70.0
max_boost_db = 12.0
max_cut_db = 12.0

# heavy rms + auto-makeup: loud and even, fidelity be damned
[compressor]
enabled = true
detector = "rms"
threshold_db = -24.0
ratio = 6.0
knee_db = 6.0
attack_ms = 10.0
release_ms = 150.0
makeup_db = "auto"
rms_window_ms = 60.0

# ceiling just under 0, no soft tier — let the brickwall slam
[limiter]
ceiling_dbtp = -0.1
lookahead_ms = 2.0
release_ms = 60.0
hold_ms = 3.0
oversample = 4
link = "stereo"

[meters]
publish_hz = 20.0

[[rules]]
match = { process_binary = ["ardour", "reaper", "qpwgraph", "carla", "bitwig-studio"] }
route = "bypass"

# music players processed so the whole room mix is loud and even
[[rules]]
match = { process_binary = ["spotify", "mpv", "vlc", "strawberry", "rhythmbox", "audacious", "mpd"] }
route = "processed"

[default_route]
route = "processed"
