name = "night"
description = "Aggressive narrow-dynamic listening for late hours."

[agc]
enabled = true
target_lufs = -20.0
attack_ms = 1000.0
release_ms = 400.0
silence_threshold_lufs = -70.0
max_boost_db = 18.0
max_cut_db = 6.0

[compressor]
enabled = true
detector = "peak"
threshold_db = -28.0
ratio = 4.0
knee_db = 8.0
attack_ms = 5.0
release_ms = 60.0
makeup_db = "auto"

[limiter]
ceiling_dbtp = -1.0
lookahead_ms = 3.0
release_ms = 60.0
hold_ms = 5.0
oversample = 4
link = "stereo"

# tight dynamics: 8 dB psr keeps transients down at low volume
[limiter.soft]
max_psr_db = 8.0
static_ceiling_dbtp = -10.0
attack_ms = 3.0
release_ms = 150.0

[meters]
publish_hz = 20.0

[[rules]]
match = { process_binary = ["ardour", "reaper", "qpwgraph", "carla", "bitwig-studio"] }
route = "bypass"

[default_route]
route = "processed"
